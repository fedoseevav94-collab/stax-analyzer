name: STAX AI Quality Queue

on:
  schedule:
    # Каждые 6 часов по МСК: 00:00, 06:00, 12:00, 18:00
    - cron: '0 21,3,9,15 * * *'
    # Дополнительные ночные прогоны по МСК: 23:30, 02:30, 05:30
    - cron: '30 20,23,2 * * *'
  workflow_dispatch:
    inputs:
      drain_all:
        description: "Обработать также P3-кандидатов, даже если запуск не ночью"
        required: false
        type: boolean
        default: false
      queue_limit:
        description: "Лимит диалогов из AI-очереди за запуск"
        required: false
        default: ""

jobs:
  analyze-ai-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI quality queue
        run: python -m app.main
        env:
          STAX_TOKEN: ${{ secrets.STAX_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          CONFIDENCE_THRESHOLD: ${{ secrets.CONFIDENCE_THRESHOLD }}
          DEDUP_WINDOW_DAYS: ${{ secrets.DEDUP_WINDOW_DAYS }}
          AI_BATCH_DELAY_SECONDS: ${{ secrets.AI_BATCH_DELAY_SECONDS }}
          WAZZUP_FRONTEND_BASE_URL: ${{ secrets.WAZZUP_FRONTEND_BASE_URL }}
          CLIENT_APP_FRONTEND_BASE_URL: ${{ secrets.CLIENT_APP_FRONTEND_BASE_URL }}
          RETURN_TASKS_CHAT_ID: ${{ vars.RETURN_TASKS_CHAT_ID }}
          RETURN_TASKS_UPDATES_LIMIT: ${{ vars.RETURN_TASKS_UPDATES_LIMIT }}
          AI_QUEUE_DAY_LIMIT: ${{ vars.AI_QUEUE_DAY_LIMIT }}
          AI_QUEUE_NIGHT_LIMIT: ${{ vars.AI_QUEUE_NIGHT_LIMIT }}
          RUN_MODE: ai_queue
          AI_QUEUE_DRAIN_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.drain_all || 'false' }}
          AI_QUEUE_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.queue_limit || '' }}
